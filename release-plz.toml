[workspace]
allow_dirty = true
changelog_update = true
dependencies_update = true
features_always_increment_minor = false
git_release_enable = true
git_release_name = "{{ package }} v{{ version }}"
git_tag_name = "{{ package }}-v{{ version }}"
pr_branch_prefix = "release-plz-"
pr_labels = ["release"]
pr_name = "chore(release): {{ version }}"
publish = true
publish_allow_dirty = true
publish_timeout = "30m"
release_always = true
release_commits = '^((feat|fix|perf|refactor|revert)(\([a-z0-9][a-z0-9._/-]*\))?(!)?|[a-z]+(\([a-z0-9][a-z0-9._/-]*\))?!): .+'
repo_url = "https://github.com/f0rr0/oliphaunt"
semver_check = true

[changelog]
protect_breaking_commits = true
sort_commits = "oldest"
tag_pattern = '^[0-9]+\.[0-9]+\.[0-9]+.*$'
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert", group = "Changed" },
  { message = "^.*!", group = "Breaking" },
  { message = "^docs", skip = true },
  { message = "^test", skip = true },
  { message = "^ci", skip = true },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
]

[[package]]
name = "pglite-oxide"
version_group = "pglite-oxide"
changelog_path = "CHANGELOG.md"
changelog_include = [
  "pglite-oxide-assets",
  "pglite-oxide-aot-aarch64-apple-darwin",
  "pglite-oxide-aot-x86_64-unknown-linux-gnu",
  "pglite-oxide-aot-aarch64-unknown-linux-gnu",
  "pglite-oxide-aot-x86_64-pc-windows-msvc",
]
git_release_enable = true
git_tag_name = "{{ version }}"

[[package]]
name = "pglite-oxide-assets"
version_group = "pglite-oxide"
changelog_update = false
git_release_enable = false
git_tag_enable = false
semver_check = false

